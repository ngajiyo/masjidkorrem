<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadwal Korrem Masjid</title>
  <!-- Tailwind CSS v3 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase JS via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased pb-12">

  <!-- HEADER BAR -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-10 px-4 py-3 flex justify-between items-center shadow-sm">
    <h1 id="header-title" class="text-xl font-bold select-none cursor-pointer tracking-tight text-slate-800 active:opacity-60 transition">
      静态 🕌 Jadwal Korrem Masjid
    </h1>
    <div id="admin-actions" class="hidden flex gap-2 items-center">
      <button id="btn-add" class="bg-blue-600 hover:bg-blue-700 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-lg shadow-sm transition">+</button>
      <button id="btn-exit-admin" class="text-xs text-gray-400 hover:text-gray-600">Keluar Admin</button>
    </div>
  </header>

  <div class="max-w-md mx-auto px-4 mt-4 space-y-4">
    
    <!-- IOS STYLE CALENDAR CARD -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4">
      <div class="flex justify-between items-center mb-4">
        <!-- Area Judul Kalender + Dropdown Navigasi Cepat -->
        <div class="relative flex items-center gap-1">
          <h2 id="calendar-month-year" class="text-lg font-semibold text-slate-800 cursor-pointer hover:bg-gray-100 px-2 py-1 rounded-lg transition flex items-center gap-1 select-none">
            <span>Mei 2026</span> <span class="text-xs text-gray-400">▼</span>
          </h2>
          
          <!-- Dropdown Menu -->
          <div id="nav-dropdown" class="hidden absolute top-10 left-0 bg-white border border-gray-200 rounded-xl shadow-xl p-3 z-20 w-64 flex gap-2 animate-fadeIn">
            <select id="select-month" class="flex-1 bg-gray-50 border border-gray-200 rounded-lg p-1.5 text-sm focus:outline-none focus:border-blue-500"></select>
            <select id="select-year" class="flex-1 bg-gray-50 border border-gray-200 rounded-lg p-1.5 text-sm focus:outline-none focus:border-blue-500"></select>
          </div>
        </div>

        <div class="flex gap-4 text-blue-600 font-semibold">
          <button id="btn-prev-month" class="p-1 px-3 bg-gray-50 rounded-lg active:bg-gray-200">&#10094;</button>
          <button id="btn-next-month" class="p-1 px-3 bg-gray-50 rounded-lg active:bg-gray-200">&#10095;</button>
        </div>
      </div>

      <!-- Nama Hari -->
      <div class="grid grid-cols-7 gap-1 text-center text-xs font-medium text-gray-400 mb-2">
        <div>Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div>Sab</div>
      </div>

      <!-- Grid Tanggal -->
      <div id="calendar-grid" class="grid grid-cols-7 gap-1 text-center"></div>
    </div>

    <!-- INPUT CARI MASJID -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-3 space-y-2">
      <div class="relative">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400 text-sm">🔍</span>
        <input type="text" id="search-input" placeholder="Cari nama atau alamat masjid..." class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2 pl-9 pr-4 text-sm focus:outline-none focus:border-blue-500 transition">
      </div>
      <div id="search-results-list" class="space-y-2 max-h-60 overflow-y-auto hidden pt-1"></div>
    </div>

    <!-- DETAIL MASJID SAAT KLIK TANGGAL -->
    <div id="detail-card" class="hidden bg-white rounded-2xl shadow-sm border border-gray-200 p-4 space-y-3">
      <div class="flex justify-between items-center border-b pb-2">
        <h3 id="detail-date-title" class="font-bold text-gray-500 text-xs tracking-wider uppercase"></h3>
        <button id="btn-close-detail" class="text-xs text-gray-400">Tutup</button>
      </div>
      <div id="detail-list" class="space-y-3"></div>
    </div>

    <!-- NEXT AGENDA -->
    <div class="space-y-2">
      <h3 class="font-bold text-xs text-gray-400 tracking-wider uppercase pl-1">Agenda Mendatang</h3>
      <div id="next-agenda-list" class="space-y-2.5"></div>
    </div>
  </div>

  <!-- FORM INPUT MODAL (ADMIN ONLY) -->
  <div id="modal-form" class="hidden fixed inset-0 bg-black/50 flex items-end sm:items-center justify-center p-4 z-50">
    <div class="bg-white w-full max-w-md rounded-t-3xl sm:rounded-2xl p-6 max-h-[90vh] overflow-y-auto shadow-xl">
      <h3 id="modal-title" class="text-lg font-bold text-slate-800 mb-4">Tambah Jadwal Korrem</h3>
      <form id="schedule-form" class="space-y-4">
        <input type="hidden" id="form-id">
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Nama Masjid</label>
          <input required type="text" id="form-nama" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-none focus:border-blue-500">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Alamat Masjid</label>
          <textarea required id="form-alamat" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-none focus:border-blue-500" rows="2"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Nama Takmir</label>
            <input required type="text" id="form-takmir" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-none focus:border-blue-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">No WA (628...)</label>
            <input required type="text" id="form-wa" placeholder="6281234..." class="w-full bg-gray-50 border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-none focus:border-blue-500">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Tanggal Dibersihkan</label>
            <input required type="date" id="form-tanggal" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-none focus:border-blue-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Urutan Aksi (Aksi Ke-)</label>
            <input required type="number" id="form-aksi-ke" min="1" placeholder="Contoh: 1" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-none focus:border-blue-500">
          </div>
        </div>
        <div class="flex items-center gap-2 py-1">
          <input type="checkbox" id="form-selesai" class="w-4 h-4 rounded text-blue-600">
          <label for="form-selesai" class="text-sm font-medium text-slate-700">Sudah dibersihkan oleh Korrem</label>
        </div>
        <div class="flex gap-2 pt-2">
          <button type="button" id="btn-cancel-form" class="flex-1 bg-gray-100 hover:bg-gray-200 text-slate-700 py-3 rounded-xl font-semibold text-sm transition">Batal</button>
          <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold text-sm transition shadow-md">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <!-- LOGIKA APLIKASI -->
  <script>
    const SUPABASE_URL = "https://pfichwnfffjzibusofao.supabase.co"; 
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmaWNod25mZmZqemlidXNvZmFvIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2NTgzMTQ2MiwiZXhwIjoyMDgxNDA3NDYyfQ.dDx1TLlOGT_ZYRWrRh8Rj1-3sn7tFhiAawiUb02KsVs";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // State Aplikasi
    let currentDate = new Date();
    let schedules = [];
    let selectedDateStr = null;
    let clickCount = 0;
    let isAdmin = false;

    // DOM Elements
    const calendarGrid = document.getElementById('calendar-grid');
    const monthYearTitle = document.getElementById('calendar-month-year');
    const headerTitle = document.getElementById('header-title');
    const adminActions = document.getElementById('admin-actions');
    const detailCard = document.getElementById('detail-card');
    const detailDateTitle = document.getElementById('detail-date-title');
    const detailList = document.getElementById('detail-list');
    const nextAgendaList = document.getElementById('next-agenda-list');
    const searchInput = document.getElementById('search-input');
    const searchResultsList = document.getElementById('search-results-list');
    const modalForm = document.getElementById('modal-form');
    const scheduleForm = document.getElementById('schedule-form');
    
    const navDropdown = document.getElementById('nav-dropdown');
    const selectMonth = document.getElementById('select-month');
    const selectYear = document.getElementById('select-year');

    const namaBulan = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];

    function formatDateLocal(dateObj) {
      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, '0');
      const day = String(dateObj.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    window.addEventListener('DOMContentLoaded', () => {
      initDropdownOptions();
      fetchSchedules();
      setupEventListeners();
    });

    function initDropdownOptions() {
      namaBulan.forEach((bulan, index) => {
        const opt = document.createElement('option');
        opt.value = index;
        opt.innerText = bulan;
        selectMonth.appendChild(opt);
      });

      const startYear = 2018;
      const endYear = new Date().getFullYear() + 5;
      for (let y = startYear; y <= endYear; y++) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.innerText = y;
        selectYear.appendChild(opt);
      }
    }

    async function fetchSchedules() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      
      const firstDayObj = new Date(year, month, 1);
      const lastDayObj = new Date(year, month + 1, 0);

      const firstDay = `${firstDayObj.getFullYear()}-${String(firstDayObj.getMonth() + 1).padStart(2, '0')}-01`;
      const lastDay = `${lastDayObj.getFullYear()}-${String(lastDayObj.getMonth() + 1).padStart(2, '0')}-${String(lastDayObj.getDate()).padStart(2, '0')}`;

      const { data, error } = await supabaseClient
        .from('masjid_schedules')
        .select('*')
        .gte('jadwal_dibersihkan', firstDay)
        .lte('jadwal_dibersihkan', lastDay);

      if (!error && data) {
        schedules = data;
      }
      
      renderCalendar();
      renderNextAgenda();
      if (selectedDateStr) renderDetail();
    }

    function renderCalendar() {
      monthYearTitle.querySelector('span').innerText = currentDate.toLocaleString('id-ID', { month: 'long', year: 'numeric' });
      
      selectMonth.value = currentDate.getMonth();
      selectYear.value = currentDate.getFullYear();

      calendarGrid.innerHTML = '';

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const startDay = new Date(year, month, 1).getDay();
      const totalDays = new Date(year, month + 1, 0).getDate();
      const todayStr = formatDateLocal(new Date());

      for (let i = 0; i < startDay; i++) {
        calendarGrid.appendChild(document.createElement('div'));
      }

      for (let day = 1; day <= totalDays; day++) {
        const date = new Date(year, month, day);
        const dateStr = formatDateLocal(date);
        
        const daySchedules = schedules.filter(s => s.jadwal_dibersihkan === dateStr);
        const hasSchedule = daySchedules.length > 0;
        const isAllFinished = hasSchedule && daySchedules.every(s => s.status_selesai === true);

        const isSelected = selectedDateStr === dateStr;
        const isToday = todayStr === dateStr;

        const btn = document.createElement('button');
        btn.type = 'button';
        
        // Logika pewarnaan iOS yang diperbarui agar fleksibel dan tidak bertabrakan
        let baseColors = 'text-slate-700 hover:bg-gray-100';
        let outlineStyle = '';

        if (isToday) {
          // Hari ini selalu biru agak tua, angka putih
          baseColors = 'bg-blue-700 text-white font-bold shadow-md';
        } else if (isAllFinished) {
          // Selesai semua diberi border hijau lingkaran penuh
          baseColors = 'border-2 border-green-500 bg-green-50 text-green-700 font-bold';
        }

        // Jika tanggal ini sedang dipilih/diklik oleh user, tambahkan outline ring biru luar saja
        if (isSelected) {
          outlineStyle = 'ring-2 ring-blue-500 ring-offset-2';
        }

        btn.className = `relative py-2.5 text-sm font-medium rounded-full flex flex-col items-center justify-center transition active:scale-95 aspect-square ${baseColors} ${outlineStyle}`;
        btn.innerText = day;

        // Titik indikator amber hanya jika ada jadwal yang belum selesai, dan tidak menyala saat bertumpuk di tanggal 'Hari Ini' agar kontras
        if (hasSchedule && !isAllFinished) {
          const dot = document.createElement('span');
          dot.className = `absolute bottom-1 w-1.5 h-1.5 rounded-full ${isToday ? 'bg-white' : 'bg-amber-500'}`;
          btn.appendChild(dot);
        }

        btn.onclick = () => {
          selectedDateStr = isSelected ? null : dateStr;
          if(selectedDateStr) {
            detailCard.classList.remove('hidden');
            renderDetail();
          } else {
            detailCard.classList.add('hidden');
          }
          renderCalendar();
        };

        calendarGrid.appendChild(btn);
      }
    }

    function renderDetail() {
      detailDateTitle.innerText = `Jadwal Tanggal: ${new Date(selectedDateStr).toLocaleDateString('id-ID', { dateStyle: 'medium' })}`;
      detailList.innerHTML = '';

      const activeSchedules = schedules
        .filter(s => s.jadwal_dibersihkan === selectedDateStr)
        .sort((a, b) => (a.aksi_ke || 0) - (b.aksi_ke || 0));

      if (activeSchedules.length === 0) {
        detailList.innerHTML = `<p class="text-sm text-gray-400 text-center py-4">Tidak ada jadwal pembersihan.</p>`;
        return;
      }

      activeSchedules.forEach(item => {
        const div = document.createElement('div');
        div.className = "p-3 bg-slate-50 rounded-xl space-y-2 border border-slate-100 shadow-sm";
        div.innerHTML = `
          <div class="flex justify-between items-start gap-1">
            <div class="min-w-0">
              <span class="inline-block text-[10px] bg-slate-200 text-slate-700 px-1.5 py-0.5 rounded font-bold mb-1">Aksi Ke-${item.aksi_ke || '-'}</span>
              <h4 class="font-bold text-base text-slate-800 truncate">${item.nama_masjid}</h4>
            </div>
            <span class="text-[10px] shrink-0 px-2 py-0.5 rounded-full font-semibold ${item.status_selesai ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">
              ${item.status_selesai ? 'Selesai' : 'Rencana'}
            </span>
          </div>
          <p class="text-xs text-gray-600">📍 ${item.alamat_masjid}</p>
          <div class="text-xs text-gray-500 pt-2 border-t border-dashed flex justify-between items-center">
            <div><p class="font-medium text-slate-700">Takmir: ${item.nama_takmir}</p></div>
            <a href="https://wa.me/${item.no_wa_takmir.replace(/[^0-9]/g, '')}" target="_blank" class="bg-emerald-500 text-white px-3 py-1 rounded-full font-semibold text-[11px]">💬 WhatsApp</a>
          </div>
          <div class="admin-edit-zone ${isAdmin ? 'flex' : 'hidden'} gap-2 pt-2 border-t mt-2">
            <button onclick='window.openEditForm(${JSON.stringify(item)})' class="flex-1 bg-gray-200 text-slate-700 text-xs py-1.5 font-medium rounded-lg">Edit</button>
            <button onclick="window.deleteSchedule(${item.id})" class="flex-1 bg-red-50 text-red-600 text-xs py-1.5 font-medium rounded-lg">Hapus</button>
          </div>
        `;
        detailList.appendChild(div);
      });
    }

    function handleSearch() {
      const keyword = searchInput.value.toLowerCase().trim();
      if (!keyword) {
        searchResultsList.innerHTML = '';
        searchResultsList.classList.add('hidden');
        return;
      }

      const filtered = schedules.filter(s => 
        s.nama_masjid.toLowerCase().includes(keyword) || 
        s.alamat_masjid.toLowerCase().includes(keyword)
      ).sort((a, b) => (a.aksi_ke || 0) - (b.aksi_ke || 0));

      searchResultsList.innerHTML = '';
      searchResultsList.classList.remove('hidden');

      if (filtered.length === 0) {
        searchResultsList.innerHTML = `<p class="text-xs text-gray-400 text-center py-2">Masjid tidak ditemukan di bulan ini.</p>`;
        return;
      }

      filtered.forEach(item => {
        const div = document.createElement('div');
        div.className = "p-2.5 bg-blue-50/50 hover:bg-blue-50 border border-blue-100 rounded-xl flex justify-between items-center gap-2 cursor-pointer transition active:scale-[0.99]";
        div.innerHTML = `
          <div class="min-w-0 flex-1">
            <h5 class="font-semibold text-xs text-slate-800 truncate"><span class="text-blue-600 font-bold">[Ke-${item.aksi_ke || '-'}]</span> ${item.nama_masjid}</h5>
            <p class="text-[10px] text-gray-500 truncate">📍 ${item.alamat_masjid}</p>
          </div>
          <span class="text-[10px] shrink-0 font-bold text-gray-500 bg-white px-2 py-1 rounded-lg border">
            ${new Date(item.jadwal_dibersihkan).toLocaleDateString('id-ID', {day: 'numeric', month: 'short'})}
          </span>
        `;
        div.onclick = () => {
          selectedDateStr = item.jadwal_dibersihkan;
          detailCard.classList.remove('hidden');
          renderCalendar();
          renderDetail();
          searchInput.value = '';
          searchResultsList.classList.add('hidden');
        };
        searchResultsList.appendChild(div);
      });
    }

    function renderNextAgenda() {
      nextAgendaList.innerHTML = '';
      const today = new Date().setHours(0,0,0,0);
      
      const nextAgendas = schedules
        .filter(s => new Date(s.jadwal_dibersihkan).setHours(0,0,0,0) >= today)
        .sort((a, b) => {
          const diffDate = new Date(a.jadwal_dibersihkan) - new Date(b.jadwal_dibersihkan);
          if (diffDate !== 0) return diffDate;
          return (a.aksi_ke || 0) - (b.aksi_ke || 0);
        })
        .slice(0, 4);

      if (nextAgendas.length === 0) {
        nextAgendaList.innerHTML = `<div class="bg-white rounded-2xl p-6 text-center text-gray-400 border border-gray-200 text-sm shadow-sm">Belum ada agenda terdekat.</div>`;
        return;
      }

      nextAgendas.forEach(item => {
        const div = document.createElement('div');
        div.className = "bg-white rounded-2xl p-3 shadow-sm border border-gray-200 flex items-center justify-between gap-3";
        div.innerHTML = `
          <div class="min-w-0 flex-1">
            <span class="inline-block text-[9px] font-bold bg-slate-100 text-slate-600 px-1 rounded mb-0.5">Aksi Ke-${item.aksi_ke || '-'}</span>
            <h4 class="font-semibold text-slate-800 text-sm truncate">${item.nama_masjid}</h4>
            <p class="text-[11px] text-gray-400 truncate">${item.alamat_masjid}</p>
          </div>
          <div class="text-right shrink-0">
            <span class="block text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-lg">
              ${new Date(item.jadwal_dibersihkan).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' })}
            </span>
          </div>
        `;
        nextAgendaList.appendChild(div);
      });
    }

    function setupEventListeners() {
      searchInput.addEventListener('input', handleSearch);

      monthYearTitle.onclick = (e) => {
        e.stopPropagation();
        navDropdown.classList.toggle('hidden');
      };

      const handleDropdownChange = () => {
        currentDate = new Date(parseInt(selectYear.value), parseInt(selectMonth.value), 1);
        navDropdown.classList.add('hidden');
        fetchSchedules();
      };

      selectMonth.onchange = handleDropdownChange;
      selectYear.onchange = handleDropdownChange;

      document.addEventListener('click', () => {
        navDropdown.classList.add('hidden');
      });
      navDropdown.onclick = (e) => e.stopPropagation();

      headerTitle.onclick = () => {
        if (isAdmin) return;
        clickCount++;
        if (clickCount === 5) {
          isAdmin = true;
          clickCount = 0;
          alert('🔓 Mode Administrator Aktif!');
          adminActions.classList.remove('hidden');
          headerTitle.innerHTML = 'Jadwal Korrem Masjid <span class="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full ml-1 font-semibold">Admin</span>';
          if (selectedDateStr) renderDetail();
        }
        setTimeout(() => { clickCount = 0; }, 3000);
      };

      document.getElementById('btn-exit-admin').onclick = () => {
        isAdmin = false;
        adminActions.classList.add('hidden');
        headerTitle.innerHTML = '静态 127394; Jadwal Korrem Masjid';
        if (selectedDateStr) renderDetail();
      };

      document.getElementById('btn-prev-month').onclick = () => {
        currentDate.setMonth(currentDate.getMonth() - 1);
        fetchSchedules();
      };
      document.getElementById('btn-next-month').onclick = () => {
        currentDate.setMonth(currentDate.getMonth() + 1);
        fetchSchedules();
      };

      document.getElementById('btn-add').onclick = () => {
        document.getElementById('modal-title').innerText = "Tambah Jadwal Korrem";
        scheduleForm.reset();
        document.getElementById('form-id').value = '';
        
        if (selectedDateStr) {
          document.getElementById('form-tanggal').value = selectedDateStr;
          const countToday = schedules.filter(s => s.jadwal_dibersihkan === selectedDateStr).length;
          document.getElementById('form-aksi-ke').value = countToday + 1;
        } else {
          document.getElementById('form-tanggal').value = formatDateLocal(new Date());
          document.getElementById('form-aksi-ke').value = 1;
        }
        modalForm.classList.remove('hidden');
      };

      document.getElementById('btn-cancel-form').onclick = () => modalForm.classList.add('hidden');
      document.getElementById('btn-close-detail').onclick = () => {
        selectedDateStr = null;
        detailCard.classList.add('hidden');
        renderCalendar();
      };

      scheduleForm.onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('form-id').value;
        const payload = {
          nama_masjid: document.getElementById('form-nama').value,
          alamat_masjid: document.getElementById('form-alamat').value,
          nama_takmir: document.getElementById('form-takmir').value,
          no_wa_takmir: document.getElementById('form-wa').value,
          jadwal_dibersihkan: document.getElementById('form-tanggal').value,
          aksi_ke: parseInt(document.getElementById('form-aksi-ke').value) || 1,
          status_selesai: document.getElementById('form-selesai').checked
        };

        if (id) {
          await supabaseClient.from('masjid_schedules').update(payload).eq('id', id);
        } else {
          await supabaseClient.from('masjid_schedules').insert([payload]);
        }

        modalForm.classList.add('hidden');
        fetchSchedules();
      };
    }

    window.openEditForm = (item) => {
      document.getElementById('modal-title').innerText = "Edit Jadwal Masjid";
      document.getElementById('form-id').value = item.id;
      document.getElementById('form-nama').value = item.nama_masjid;
      document.getElementById('form-alamat').value = item.alamat_masjid;
      document.getElementById('form-takmir').value = item.nama_takmir;
      document.getElementById('form-wa').value = item.no_wa_takmir;
      document.getElementById('form-tanggal').value = item.jadwal_dibersihkan;
      document.getElementById('form-aksi-ke').value = item.aksi_ke || 1;
      document.getElementById('form-selesai').checked = item.status_selesai;
      modalForm.classList.remove('hidden');
    };

    window.deleteSchedule = async (id) => {
      if (confirm('Apakah Anda yakin ingin menghapus jadwal ini?')) {
        await supabaseClient.from('masjid_schedules').delete().eq('id', id);
        fetchSchedules();
      }
    };
  </script>
</body>
</html>
